# ==============================================================================
# nFPM Build Configuration — luci-app-telemt v3.4.0
# Defines package metadata, architecture, and dependencies for IPK/APK builds.
# ==============================================================================
name: "luci-app-telemt"
platform: "linux"
version: "3.4.0"
section: "net"
maintainer: "Medvedolog <Medvedolog@github.com>"
description: |
  LuCI WebUI for Telemt MTProxy (v3.4.0). Requires telemt core v3.4.15+.
  Features: external metrics/API bind addresses, client_mss tuning, dynamic SNI mask,
  Self-Stealth mask, Shadowsocks upstream, Zero-CORS API proxy, AJAX-theme (Argon) status fix,
  Dark theme support, Graceful degradation, and OpenWrt 25+ CSR support.
depends:
  - libc
  - luci-base
  - luci-compat
  - qrencode
  - ca-bundle
contents:
  - src: ./usr
    dst: /usr
  # UCI defaults config — ensures CBI tabs render on fresh install
  - src: ./telemt.config
    dst: /etc/config/telemt
    type: config
scripts:
  postinstall: ./scripts/postinst
  preremove: ./scripts/prerm
  postremove: ./scripts/postrm
apk:
  arch: "noarch"
ipk:
  arch: "all"
